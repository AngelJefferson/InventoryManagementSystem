services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inventariocaid
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Inventario9920
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:80"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:80"
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=inventariocaid;Username=postgres;Password=Inventario9920;SSL Mode=Disable"
      Jwt__Key: "InventoryManagementSuperSecretKey2024!@#$%"
      Jwt__Issuer: "InventoryManagementAPI"
      Jwt__Audience: "InventoryManagementClient"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
